<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Ninad Khune | Data Engineer & Data Scientist</title>
    <meta name="description" content="Portfolio of Ninad Khune, Data Engineer and Data Scientist specializing in Core Banking Systems, scalable ETL pipelines, and Big Data frameworks.">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;600;700&family=Fira+Code:wght@400;500&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <nav id="navbar">
        <div class="nav-container">
            <div class="logo">NK<span class="accent">.</span></div>
            <ul class="nav-links">
                <li><a href="#about">About</a></li>
                <li><a href="#skills">Skills</a></li>
                <li><a href="#experience">Experience</a></li>
                <li><a href="#projects">Projects</a></li>
                <li><a href="#contact">Contact</a></li>
            </ul>
        </div>
    </nav>

    <main>
        <section id="hero">
            <div class="hero-content">
                <h1 id="hero-name" class="glitch" data-text=""></h1>
                <h2 id="hero-title" class="subtitle"></h2>
                <p id="hero-summary" class="summary"></p>
                <div class="hero-actions">
                    <a href="#projects" class="btn btn-primary">View My Work</a>
                    <a href="#contact" class="btn btn-secondary">Contact Me</a>
                </div>
            </div>
            <div class="hero-background"></div>
        </section>

        <section id="about" class="section">
            <h2 class="section-title">About Me</h2>
            <div class="about-grid">
                <div class="about-text" id="about-text">
                    <!-- Populated by JS -->
                </div>
                <div class="about-details" id="about-details">
                    <!-- Populated by JS -->
                </div>
            </div>
        </section>

        <section id="skills" class="section">
            <h2 class="section-title">Technical Expertise</h2>
            <div class="skills-container" id="skills-container">
                <!-- Populated by JS -->
            </div>
        </section>

        <section id="experience" class="section">
            <h2 class="section-title">Professional Experience</h2>
            <div class="timeline" id="experience-timeline">
                <!-- Populated by JS -->
            </div>
        </section>

        <section id="projects" class="section">
            <h2 class="section-title">Featured Projects</h2>
            <div class="projects-grid" id="projects-grid">
                <!-- Populated by JS -->
            </div>
        </section>

        <section id="contact" class="section">
            <h2 class="section-title">Let's Connect</h2>
            <div class="contact-card" id="contact-card">
                <!-- Populated by JS -->
            </div>
        </section>
    </main>

    <footer>
        <div class="footer-content" id="footer-content">
            <!-- Populated by JS -->
        </div>
    </footer>

    <script src="script.js"></script>
</body>
</html>
